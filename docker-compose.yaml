version: "3.8"

services:
  # Local PostgreSQL for development
  db:
    image: postgres:15-alpine
    container_name: notification_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: notification_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # First-time init only: mirrors Alembic revision; kept for a one-command local bootstrap
      - ./postgres_schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
