# Alembic configuration: keep schema changes versioned. Run from the backend/ directory.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_format = version_locations

# Placeholder; env.py overwrites with Settings.database_url.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
hooks =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
